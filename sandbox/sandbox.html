<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        window.alert(`Calculo de Velocidade media`)
       var d1 = Number(window.prompt('Qual foi a distancia que vc percorreu (em Metros)'))
       var t1 = Number(window.prompt('Em quanto tempo vc percorreu essa distancia? (em segundos)'))
       var r =  d1 / t1
       document.write(`A sua velocidade é de ${r}m/s`)
    </script>
</body>
</html>
