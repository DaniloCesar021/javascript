<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

<div class="container" >
    <h1>Multas</h1>
    Velocidade do carro <input type="text" name="" id="ipx" > km/h
    <input type="button" value="calcular" onclick="calcular()" >
    <div id="res"></div>
    
</div>
<script>
function calcular(){
    var inpx = document.getElementById('ipx')
    var res = document.getElementById('res')
    var vel = (inpx.value)
    res.innerHTML = ` sua velocidade é de <strong>${vel} </strong>Km/h`
    if(vel > 60 ) {
        res.innerHTML += `<p>voce foi MULTADO!</p>`
    } else {
        res.innerHTML += `<p>voce esta livre de  multas!</p>`
    }
}

</script>
</body>
</html>
