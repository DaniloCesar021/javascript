<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Velocidade do carro <input type="text" id="ip">Km/h
    <input type="button" value="calcular" onclick="cal()">
    <div id="res"></div>



    <script>
        function cal() {
            var ip1 = document.getElementById('ip')
            var res = document.getElementById('res')
            var vel = Number(ip1.value)
            res.innerHTML = `<p>sua velocidade é de: <strong> ${vel} km/h</strong></p>`
            if (vel > 60) {
                res.innerHTML += `<p><strong>VC FOI MULTADO</strong></p>` 
            } else {
            res.innerHTML += `<p>vc esta livre de multas</p>` }

        }




    </script>
</body>
</html>
